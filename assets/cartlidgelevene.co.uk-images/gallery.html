<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Image Gallery</title><style>body{font-family:Inter,Arial,sans-serif;background:#0f1115;color:#e8edf6;margin:0}.top{position:sticky;top:0;background:#121722;border-bottom:1px solid #2a3246;padding:10px 14px}.grid{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}.card{background:#161b27;border:1px solid #2a3246;border-radius:10px;padding:8px}.card img{width:100%;height:160px;object-fit:cover;background:#000;border-radius:6px;cursor:zoom-in}.n{margin-top:6px;font-size:11px;word-break:break-all;color:#aeb8cf}#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:50;align-items:center;justify-content:center;padding:20px}#lightbox img{max-width:95vw;max-height:90vh}#close{position:fixed;top:14px;right:14px;background:#111a2b;color:#fff;border:1px solid #3a465f;border-radius:8px;padding:8px 10px;cursor:pointer}</style></head><body><div class="top">Images: 5</div><div class="grid"><div class="card"><a href="raw/CL_Studio4-medium.jpg"><img loading="lazy" src="raw/CL_Studio4-medium.jpg" data-full="raw/CL_Studio4-medium.jpg"></a><div class="n">CL_Studio4-medium.jpg</div></div><div class="card"><a href="raw/apple-touch-icon.png"><img loading="lazy" src="raw/apple-touch-icon.png" data-full="raw/apple-touch-icon.png"></a><div class="n">apple-touch-icon.png</div></div><div class="card"><a href="raw/favicon-16x16.png"><img loading="lazy" src="raw/favicon-16x16.png" data-full="raw/favicon-16x16.png"></a><div class="n">favicon-16x16.png</div></div><div class="card"><a href="raw/favicon-32x32.png"><img loading="lazy" src="raw/favicon-32x32.png" data-full="raw/favicon-32x32.png"></a><div class="n">favicon-32x32.png</div></div><div class="card"><a href="raw/safari-pinned-tab.svg"><img loading="lazy" src="raw/safari-pinned-tab.svg" data-full="raw/safari-pinned-tab.svg"></a><div class="n">safari-pinned-tab.svg</div></div></div><div id="lightbox"><button id="close">✕ Close</button><img id="lbimg" src=""></div><script>const lb=document.getElementById("lightbox"),lbimg=document.getElementById("lbimg");document.querySelectorAll(".card img").forEach(im=>im.addEventListener("click",e=>{e.preventDefault();lbimg.src=im.dataset.full;lb.style.display="flex";}));document.getElementById("close").onclick=()=>lb.style.display="none";lb.onclick=e=>{if(e.target===lb)lb.style.display="none"};</script></body></html>
