<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Wayfinding Directory</title>
  <meta name="description" content="A curated global index of high-end wayfinding consultancies involved in landmark and luxury developments." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body data-data-file="data/directory-data.json">
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div>
          <h1 class="logo">Global Wayfinding Directory</h1>
          <p class="tagline">Curated consultancy index for landmark, luxury, and destination-grade developments.</p>
        </div>
        <nav class="header-nav">
          <a href="index.html" class="nav-link active">Global</a>
          <a href="assets/eecind-images/gallery.html" class="nav-link" title="EEC Image Gallery">📷 EEC Images</a>
        </nav>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="container">
      <section class="search-section">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <input type="text" id="searchInput" placeholder="Search consultancy, sector, or keyword..." autocomplete="off" />
          <button id="clearSearch" class="clear-btn" style="display:none;">✕</button>
        </div>

        <div class="filters">
          <div class="filter-group">
            <label for="regionFilter">Region</label>
            <select id="regionFilter">
              <option value="">All Regions</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="countryFilter">Country</label>
            <select id="countryFilter">
              <option value="">All Countries</option>
            </select>
          </div>
          <div class="filter-group">
            <label for="sortBy">Sort</label>
            <select id="sortBy">
              <option value="name-asc">Name A-Z</option>
              <option value="name-desc">Name Z-A</option>
              <option value="country-asc">Country A-Z</option>
              <option value="country-desc">Country Z-A</option>
            </select>
          </div>
          <button id="resetFilters" class="reset-btn">Reset</button>
        </div>
      </section>

      <section class="results-section">
        <div class="results-header">
          <p class="results-count"><span id="resultsCount">0</span> consultancies</p>
          <div class="view-toggle">
            <button id="gridView" class="view-btn active" title="Grid View">▦</button>
            <button id="listView" class="view-btn" title="List View">☰</button>
            <button id="mapView" class="view-btn" title="Map View">🗺</button>
          </div>
        </div>

        <div id="loading" class="loading">
          <div class="spinner"></div>
          <p>Loading directory...</p>
        </div>

        <div id="resultsGrid" class="results-grid"></div>
        <div id="resultsList" class="results-list" style="display:none;"></div>
        <div id="mapContainer" class="map-container" style="display:none;"><div id="map"></div></div>

        <div id="noResults" class="no-results" style="display:none;">
          <h3>No consultancies found</h3>
          <p>Try a different region, country, or keyword.</p>
        </div>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Global Wayfinding Directory</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
